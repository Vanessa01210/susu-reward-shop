<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酥酥老師的獎勵小舖</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
      "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from 'firebase/firestore';
    import { Plus, Trash2, ShoppingBag, Package, Image as ImageIcon, X, AlertCircle } from 'lucide-react';

   const firebaseConfig = {
  apiKey: "AIzaSyCDb4MX7fuKmENSFJF46mqFF8ub4KHKQ9Y",
  authDomain: "susu-reward-shop.firebaseapp.com",
  projectId: "susu-reward-shop",
  storageBucket: "susu-reward-shop.firebasestorage.app",
  messagingSenderId: "209214547498",
  appId: "1:209214547498:web:bf44fde3936d64016a4553",
  measurementId: "G-ZT7FZMR5TP"
};
    
    const appId = 'susu-reward-system';
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- 設定點數級距 ---
    const pointOptions = [5, 10, 15, 20, 25, 30, 40, 50, 60, 80, 100];
    const pointColors = {
      5: 'bg-stone-100 text-stone-700 border-stone-200',
      10: 'bg-green-100 text-green-700 border-green-200',
      15: 'bg-yellow-100 text-yellow-700 border-yellow-200',
      20: 'bg-blue-100 text-blue-700 border-blue-200',
      25: 'bg-indigo-100 text-indigo-700 border-indigo-200',
      30: 'bg-purple-100 text-purple-700 border-purple-200',
      40: 'bg-orange-100 text-orange-700 border-orange-200',
      50: 'bg-pink-100 text-pink-700 border-pink-200',
      60: 'bg-rose-100 text-rose-700 border-rose-200',
      80: 'bg-cyan-100 text-cyan-700 border-cyan-200',
      100: 'bg-red-100 text-red-700 border-red-200 font-black shadow-sm',
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [rewards, setRewards] = useState([]);
      const [view, setView] = useState('shop');
      const [loading, setLoading] = useState(true);
      const [filterPoints, setFilterPoints] = useState('all');
      
      // 管理員密碼驗證狀態
      const [isAdminVerified, setIsAdminVerified] = useState(false);

      const [isAdding, setIsAdding] = useState(false);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);

      const [formData, setFormData] = useState({
        name: '',
        points: 10,
        stock: 5,
        imageUrl: '',
      });

      useEffect(() => {
        signInAnonymously(auth).catch(err => console.error("Auth error:", err));
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const rewardsCol = collection(db, 'artifacts', appId, 'public', 'data', 'rewards');
        const unsubscribe = onSnapshot(rewardsCol, (snapshot) => {
          const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setRewards(items.sort((a, b) => a.points - b.points));
          setLoading(false);
        }, (error) => {
          console.error("Firestore error:", error);
          setLoading(false);
        });
        return () => unsubscribe();
      }, [user]);

      // 密碼驗證功能
      const handleAdminClick = () => {
        if (isAdminVerified) {
          setView('admin');
        } else {
          const pwd = window.prompt('請輸入管理員密碼：');
          if (pwd === 'susu1234') { 
            setIsAdminVerified(true);
            setView('admin');
          } else if (pwd !== null) {
            alert('密碼錯誤！無法進入管理後台。');
          }
        }
      };

      const handleAddReward = async (e) => {
        e.preventDefault();
        if (!user || isSubmitting) return;
        setIsSubmitting(true);

        try {
          const rewardsCol = collection(db, 'artifacts', appId, 'public', 'data', 'rewards');
          await addDoc(rewardsCol, {
            name: formData.name,
            points: Number(formData.points),
            stock: Number(formData.stock),
            imageUrl: formData.imageUrl,
            createdAt: Date.now()
          });
          setFormData({ name: '', points: 10, stock: 5, imageUrl: '' });
          setIsAdding(false);
        } catch (err) {
          console.error("Add error:", err);
          alert("新增失敗，請稍後再試！");
        } finally {
          setIsSubmitting(false);
        }
      };

      const confirmDelete = async () => {
        if (!user || !deleteConfirmId) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rewards', deleteConfirmId));
          setDeleteConfirmId(null);
        } catch (err) {
          console.error("Delete error:", err);
        }
      };

      const updateStock = async (id, currentStock, delta) => {
        const newStock = Math.max(0, currentStock + delta);
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rewards', id), { stock: newStock });
        } catch (err) {
          console.error("Update error:", err);
        }
      };

      const filteredRewards = filterPoints === 'all' 
        ? rewards 
        : rewards.filter(r => r.points === Number(filterPoints));

      if (loading) {
        return (
          <div className="flex h-screen items-center justify-center bg-orange-50">
            <div className="text-orange-400 animate-pulse font-medium text-lg">載入小舖中...</div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#FFFBF5] text-slate-700 pb-20">
          <header className="bg-white border-b border-orange-100 sticky top-0 z-30 px-4 py-4 shadow-sm">
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <div>
                <h1 className="text-xl font-bold text-orange-800 flex items-center gap-2">
                  <ShoppingBag className="w-6 h-6" /> 酥酥老師的獎勵小舖
                </h1>
                <p className="text-xs text-slate-400">目前共有 {rewards.length} 個寶物</p>
              </div>
              <div className="flex bg-orange-50 p-1 rounded-xl">
                <button 
                  onClick={() => setView('shop')}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${view === 'shop' ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500'}`}
                >
                  兌換頁
                </button>
                <button 
                  onClick={handleAdminClick}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${view === 'admin' ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500'}`}
                >
                  管理後台
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto p-4 md:p-6">
            {view === 'shop' ? (
              <>
                <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-4">
                  <button 
                    onClick={() => setFilterPoints('all')}
                    className={`px-4 py-2 rounded-full whitespace-nowrap text-sm border ${filterPoints === 'all' ? 'bg-orange-500 text-white border-orange-500' : 'bg-white border-slate-200'}`}
                  >全部</button>
                  {pointOptions.map(pt => (
                    <button 
                      key={pt}
                      onClick={() => setFilterPoints(pt)}
                      className={`px-4 py-2 rounded-full whitespace-nowrap text-sm border transition-all ${filterPoints === pt ? 'bg-orange-500 text-white border-orange-500' : 'bg-white border-slate-200'}`}
                    >{pt} 點</button>
                  ))}
                </div>

                {filteredRewards.length > 0 ? (
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    {filteredRewards.map(item => (
                      <div key={item.id} className="bg-white rounded-2xl overflow-hidden border border-orange-100 shadow-sm hover:shadow-md transition-shadow group">
                        <div className="aspect-square relative overflow-hidden bg-slate-50">
                          {item.imageUrl ? (
                            <img src={item.imageUrl} alt={item.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-slate-300"><ImageIcon className="w-10 h-10" /></div>
                          )}
                          <div className={`absolute top-2 left-2 px-2 py-1 rounded-lg text-xs font-bold border ${pointColors[item.points] || 'bg-slate-100'}`}>
                            {item.points} 點
                          </div>
                          {item.stock <= 0 && (
                            <div className="absolute inset-0 bg-white/70 flex items-center justify-center">
                              <span className="bg-slate-800 text-white px-3 py-1 rounded-full text-xs font-bold tracking-widest">補貨中</span>
                            </div>
                          )}
                        </div>
                        <div className="p-3">
                          <h3 className="font-semibold text-slate-800 truncate">{item.name}</h3>
                          <div className="flex justify-between items-center mt-1">
                            <span className="text-[10px] text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">剩餘: {item.stock}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-20 bg-white rounded-3xl border border-dashed border-orange-200">
                    <Package className="w-12 h-12 mx-auto text-orange-200 mb-3" />
                    <p className="text-slate-400">這個級距目前沒有寶物喔！</p>
                  </div>
                )}
              </>
            ) : (
              <div className="space-y-6">
                {!isAdding ? (
                  <button onClick={() => setIsAdding(true)} className="w-full py-4 border-2 border-dashed border-orange-200 rounded-2xl text-orange-400 hover:text-orange-600 hover:bg-orange-50 transition-all flex items-center justify-center gap-2 font-medium">
                    <Plus className="w-5 h-5" /> 新增一個禮物
                  </button>
                ) : (
                  <form onSubmit={handleAddReward} className="bg-white p-6 rounded-2xl border border-orange-200 shadow-lg">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="font-bold text-lg text-slate-800">新增獎勵品</h2>
                      <button type="button" onClick={() => setIsAdding(false)} className="text-slate-400 hover:text-slate-600"><X className="w-5 h-5" /></button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-slate-500">禮物名稱</label>
                        <input required type="text" placeholder="例如：造型橡皮擦" className="w-full px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-slate-500">庫存數量</label>
                        <input type="number" min="0" className="w-full px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200" value={formData.stock} onChange={e => setFormData({...formData, stock: e.target.value})} />
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-slate-500">所需點數</label>
                        <select className="w-full px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200" value={formData.points} onChange={e => setFormData({...formData, points: e.target.value})}>
                          {pointOptions.map(pt => <option key={pt} value={pt}>{pt} 點</option>)}
                        </select>
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-slate-500">圖片網址 (選填)</label>
                        <input 
                          type="url" 
                          placeholder="請貼上網路圖片的網址" 
                          className="w-full px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 text-sm" 
                          value={formData.imageUrl} 
                          onChange={e => setFormData({...formData, imageUrl: e.target.value})}
                        />
                      </div>
                    </div>
                    <button type="submit" disabled={isSubmitting} className="mt-6 w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 disabled:bg-orange-300 flex justify-center items-center gap-2">
                      {isSubmitting ? '處理中...' : '確認新增'}
                    </button>
                  </form>
                )}

                <div className="bg-white rounded-3xl border border-orange-100 overflow-hidden">
                  <div className="p-4 border-b border-orange-50 bg-orange-50/30 font-bold text-slate-700">現有庫存管理</div>
                  <div className="divide-y divide-slate-50">
                    {rewards.map(item => (
                      <div key={item.id} className="p-4 flex items-center gap-4 hover:bg-slate-50">
                        <div className="w-12 h-12 rounded-lg bg-slate-100 overflow-hidden flex-shrink-0">
                          {item.imageUrl ? <img src={item.imageUrl} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-300"><ImageIcon className="w-5 h-5" /></div>}
                        </div>
                        <div className="flex-1 min-w-0">
                          <h4 className="font-semibold text-slate-800 truncate">{item.name}</h4>
                          <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold border ${pointColors[item.points]}`}>{item.points} 點</span>
                        </div>
                        <div className="flex items-center gap-3">
                          <div className="flex items-center bg-slate-100 rounded-lg px-2 py-1">
                            <button onClick={() => updateStock(item.id, item.stock, -1)} className="p-1 hover:text-orange-500"><X className="w-3 h-3" /></button>
                            <span className="w-8 text-center text-sm font-bold">{item.stock}</span>
                            <button onClick={() => updateStock(item.id, item.stock, 1)} className="p-1 hover:text-orange-500"><Plus className="w-3 h-3" /></button>
                          </div>
                          <button onClick={() => setDeleteConfirmId(item.id)} className="p-2 text-slate-300 hover:text-red-500"><Trash2 className="w-5 h-5" /></button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </main>

          {deleteConfirmId && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl">
                <div className="flex items-center gap-3 text-orange-600 mb-4">
                  <div className="bg-orange-100 p-2 rounded-full"><AlertCircle className="w-6 h-6" /></div>
                  <h3 className="text-lg font-bold">確定要刪除嗎？</h3>
                </div>
                <p className="text-slate-500 text-sm mb-6">您正在刪除一個獎勵品項，此動作無法復原。請問確定要繼續嗎？</p>
                <div className="flex gap-3">
                  <button onClick={() => setDeleteConfirmId(null)} className="flex-1 py-3 rounded-xl bg-slate-100 text-slate-600 font-bold hover:bg-slate-200">取消</button>
                  <button onClick={confirmDelete} className="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold hover:bg-red-600">確定刪除</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
