<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酥酥老師的獎勵小舖</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "firebase/app": "https://esm.sh/firebase@10.8.0/app",
      "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
      "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore",
      "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from 'firebase/firestore';
    import { Plus, Trash2, ShoppingBag, Settings, Package, Image as ImageIcon, X, AlertCircle } from 'lucide-react';

    // --- ⚠️ Firebase 參數預設區 (請替換為你的真實資料) ---
    const __firebase_config = JSON.stringify({
      apiKey: "請填入你的_API_KEY",
      authDomain: "你的專案.firebaseapp.com",
      projectId: "你的_PROJECT_ID",
      storageBucket: "你的專案.appspot.com",
      messagingSenderId: "你的_SENDER_ID",
      appId: "你的_APP_ID"
    });
    const __app_id = 'susu-reward-system';
    const __initial_auth_token = null; // 若無特定 Token 維持 null 即可，系統會走匿名登入

    // --- Firebase Configuration ---
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'susu-reward-system';

    const App = () => {
      const [user, setUser] = useState(null);
      const [rewards, setRewards] = useState([]);
      const [view, setView] = useState('shop'); // 'shop' or 'admin'
      const [loading, setLoading] = useState(true);
      const [filterPoints, setFilterPoints] = useState('all');

      // Form State
      const [isAdding, setIsAdding] = useState(false);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const [formData, setFormData] = useState({
        name: '',
        points: 10,
        stock: 5,
        imageUrl: '',
      });

      // 1. Auth Logic
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth error:", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          setUser(user);
        });
        return () => unsubscribe();
      }, []);

      // 2. Data Logic
      useEffect(() => {
        if (!user) return;

        const rewardsCol = collection(db, 'artifacts', appId, 'public', 'data', 'rewards');
        const unsubscribe = onSnapshot(rewardsCol, (snapshot) => {
          const items = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
          }));
          // 按點數排序
          const sortedItems = items.sort((a, b) => a.points - b.points);
          setRewards(sortedItems);
          setLoading(false);
        }, (error) => {
          console.error("Firestore error:", error);
          setLoading(false);
        });

        return () => unsubscribe();
      }, [user]);

      // Actions
      const handleAddReward = async (e) => {
        e.preventDefault();
        if (!user) return;
        try {
          const rewardsCol = collection(db, 'artifacts', appId, 'public', 'data', 'rewards');
          await addDoc(rewardsCol, {
            ...formData,
            points: Number(formData.points),
            stock: Number(formData.stock),
            createdAt: Date.now()
          });
          setFormData({ name: '', points: 10, stock: 5, imageUrl: '' });
          setIsAdding(false);
        } catch (err) {
          console.error("Add error:", err);
        }
      };

      const confirmDelete = async () => {
        if (!user || !deleteConfirmId) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rewards', deleteConfirmId));
          setDeleteConfirmId(null);
        } catch (err) {
          console.error("Delete error:", err);
        }
      };

      const updateStock = async (id, currentStock, delta) => {
        const newStock = Math.max(0, currentStock + delta);
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rewards', id), {
            stock: newStock
          });
        } catch (err) {
          console.error("Update error:", err);
        }
      };

      const filteredRewards = filterPoints === 'all' 
        ? rewards 
        : rewards.filter(r => r.points === Number(filterPoints));

      // 定義點數標籤顏色
      const pointColors = {
        10: 'bg-green-100 text-green-700 border-green-200',
        15: 'bg-yellow-100 text-yellow-700 border-yellow-200', // 新增 15 點顏色
        20: 'bg-blue-100 text-blue-700 border-blue-200',
        30: 'bg-purple-100 text-purple-700 border-purple-200',
        40: 'bg-orange-100 text-orange-700 border-orange-200',
        50: 'bg-pink-100 text-pink-700 border-pink-200',
      };

      if (loading) {
        return (
          <div className="flex h-screen items-center justify-center bg-orange-50">
            <div className="text-orange-400 animate-pulse font-medium text-lg">載入小舖中...</div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#FFFBF5] text-slate-700 pb-20">
          {/* Header */}
          <header className="bg-white border-b border-orange-100 sticky top-0 z-30 px-4 py-4 shadow-sm">
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <div>
                <h1 className="text-xl font-bold text-orange-800 flex items-center gap-2">
                  <ShoppingBag className="w-6 h-6" /> 酥酥老師的獎勵小舖
                </h1>
                <p className="text-xs text-slate-400">目前共有 {rewards.length} 個寶物</p>
              </div>
              <div className="flex bg-orange-50 p-1 rounded-xl">
                <button 
                  onClick={() => setView('shop')}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${view === 'shop' ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500'}`}
                >
                  學生兌換頁
                </button>
                <button 
                  onClick={() => setView('admin')}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${view === 'admin' ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500'}`}
                >
                  管理後台
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto p-4 md:p-6">
            {view === 'shop' ? (
              <>
                {/* Filter Chips */}
                <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-4">
                  <button 
                    onClick={() => setFilterPoints('all')}
                    className={`px-4 py-2 rounded-full whitespace-nowrap text-sm border ${filterPoints === 'all' ? 'bg-orange-500 text-white border-orange-500' : 'bg-white border-slate-200'}`}
                  >
                    全部
                  </button>
                  {[10, 15, 20, 30, 40, 50].map(pt => (
                    <button 
                      key={pt}
                      onClick={() => setFilterPoints(pt)}
                      className={`px-4 py-2 rounded-full whitespace-nowrap text-sm border transition-all ${filterPoints === pt ? 'bg-orange-500 text-white border-orange-500' : 'bg-white border-slate-200'}`}
                    >
                      {pt} 點
                    </button>
                  ))}
                </div>

                {/* Grid */}
                {filteredRewards.length > 0 ? (
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                    {filteredRewards.map(item => (
                      <div key={item.id} className="bg-white rounded-2xl overflow-hidden border border-orange-100 shadow-sm hover:shadow-md transition-shadow group">
                        <div className="aspect-square relative overflow-hidden bg-slate-50">
                          {item.imageUrl ? (
                            <img src={item.imageUrl} alt={item.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-slate-300">
                              <ImageIcon className="w-10 h-10" />
                            </div>
                          )}
                          <div className={`absolute top-2 left-2 px-2 py-1 rounded-lg text-xs font-bold border ${pointColors[item.points] || 'bg-slate-100'}`}>
                            {item.points} 點
                          </div>
                          {item.stock <= 0 && (
                            <div className="absolute inset-0 bg-white/70 flex items-center justify-center">
                              <span className="bg-slate-800 text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">補貨中</span>
                            </div>
                          )}
                        </div>
                        <div className="p-3">
                          <h3 className="font-semibold text-slate-800 truncate">{item.name}</h3>
                          <div className="flex justify-between items-center mt-1">
                            <span className="text-[10px] text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">庫存: {item.stock}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-20 bg-white rounded-3xl border border-dashed border-orange-200">
                    <Package className="w-12 h-12 mx-auto text-orange-200 mb-3" />
                    <p className="text-slate-400">這個級距目前沒有禮物喔！</p>
                  </div>
                )}
              </>
            ) : (
              <div className="space-y-6">
                {/* 新增表單 */}
                {!isAdding ? (
                  <button 
                    onClick={() => setIsAdding(true)}
                    className="w-full py-4 border-2 border-dashed border-orange-200 rounded-2xl text-orange-400 hover:text-orange-600 hover:border-orange-400 hover:bg-orange-50 transition-all flex items-center justify-center gap-2 font-medium"
                  >
                    <Plus className="w-5 h-5" /> 新增一個禮物
                  </button>
                ) : (
                  <form onSubmit={handleAddReward} className="bg-white p-6 rounded-2xl border border-orange-200 shadow-lg animate-in slide-in-from-top-4">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="font-bold text-lg text-slate-800">新增獎勵品</h2>
                      <button type="button" onClick={() => setIsAdding(false)} className="text-slate-400 hover:text-slate-600">
                        <X className="w-5 h-5" />
                      </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-slate-500 ml-1">禮物名稱</label>
                        <input 
                          required
                          type="text"
                          placeholder="例如：造型橡皮擦"
                          className="w-full px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-orange-200 outline-none"
                          value={formData.name}
                          onChange={e => setFormData({...formData, name: e.target.value})}
                        />
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-slate-500 ml-1">圖片網址</label>
                        <input 
                          type="url"
                          placeholder="貼上圖片網址"
                          className="w-full px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-orange-200 outline-none"
                          value={formData.imageUrl}
                          onChange={e => setFormData({...formData, imageUrl: e.target.value})}
                        />
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-slate-500 ml-1">所需點數</label>
                        <select 
                          className="w-full px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-orange-200 outline-none"
                          value={formData.points}
                          onChange={e => setFormData({...formData, points: e.target.value})}
                        >
                          {[10, 15, 20, 30, 40, 50].map(pt => <option key={pt} value={pt}>{pt} 點</option>)}
                        </select>
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-slate-500 ml-1">庫存數量</label>
                        <input 
                          type="number"
                          min="0"
                          className="w-full px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-orange-200 outline-none"
                          value={formData.stock}
                          onChange={e => setFormData({...formData, stock: e.target.value})}
                        />
                      </div>
                    </div>
                    <div className="mt-6 flex gap-3">
                      <button 
                        type="submit"
                        className="flex-1 bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition-colors shadow-md shadow-orange-100"
                      >
                        確認新增
                      </button>
                    </div>
                  </form>
                )}

                {/* 管理列表 */}
                <div className="bg-white rounded-3xl border border-orange-100 overflow-hidden">
                  <div className="p-4 border-b border-orange-50 bg-orange-50/30 flex justify-between items-center">
                    <span className="font-bold text-slate-700">現有庫存管理</span>
                  </div>
                  <div className="divide-y divide-slate-50">
                    {rewards.map(item => (
                      <div key={item.id} className="p-4 flex items-center gap-4 hover:bg-slate-50 transition-colors">
                        <div className="w-12 h-12 rounded-lg bg-slate-100 overflow-hidden flex-shrink-0">
                          {item.imageUrl ? (
                            <img src={item.imageUrl} className="w-full h-full object-cover" />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-slate-300">
                              <ImageIcon className="w-5 h-5" />
                            </div>
                          )}
                        </div>
                        <div className="flex-1 min-w-0">
                          <h4 className="font-semibold text-slate-800 truncate">{item.name}</h4>
                          <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold border ${pointColors[item.points]}`}>
                            {item.points} 點
                          </span>
                        </div>
                        <div className="flex items-center gap-3">
                          <div className="flex items-center bg-slate-100 rounded-lg px-2 py-1">
                            <button onClick={() => updateStock(item.id, item.stock, -1)} className="p-1 hover:text-orange-500"><X className="w-3 h-3" /></button>
                            <span className="w-8 text-center text-sm font-bold">{item.stock}</span>
                            <button onClick={() => updateStock(item.id, item.stock, 1)} className="p-1 hover:text-orange-500"><Plus className="w-3 h-3" /></button>
                          </div>
                          <button 
                            onClick={() => setDeleteConfirmId(item.id)} 
                            className="p-2 text-slate-300 hover:text-red-500 transition-colors"
                          >
                            <Trash2 className="w-5 h-5" />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* 刪除確認視窗 */}
          {deleteConfirmId && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-orange-100">
                <div className="flex items-center gap-3 text-orange-600 mb-4">
                  <div className="bg-orange-100 p-2 rounded-full">
                    <AlertCircle className="w-6 h-6" />
                  </div>
                  <h3 className="text-lg font-bold">確定要刪除嗎？</h3>
                </div>
                <p className="text-slate-500 text-sm mb-6 leading-relaxed">
                  您正在刪除一個獎勵品項，此動作無法復原。請問確定要繼續嗎？
                </p>
                <div className="flex gap-3">
                  <button 
                    onClick={() => setDeleteConfirmId(null)}
                    className="flex-1 py-3 px-4 rounded-xl bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 transition-colors"
                  >
                    取消
                  </button>
                  <button 
                    onClick={confirmDelete}
                    className="flex-1 py-3 px-4 rounded-xl bg-red-500 text-white font-bold hover:bg-red-600 transition-colors"
                  >
                    確定刪除
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // 啟動 React 應用程式
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
